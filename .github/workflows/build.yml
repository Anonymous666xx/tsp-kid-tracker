name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/tsp-release.keystore

      - name: Build APK
        working-directory: app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon

      - name: Zipalign APK
        id: zipalign
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)"
          APK_UNSIGNED=$(find app/app/build/outputs/apk/release -name '*.apk' | head -1)
          APK_ALIGNED="/tmp/tsp-tracker-aligned.apk"
          "$BUILD_TOOLS/zipalign" -v -p 4 "$APK_UNSIGNED" "$APK_ALIGNED" 2>&1 | tail -3
          echo "apk=$APK_ALIGNED" >> $GITHUB_OUTPUT

      - name: Sign APK with apksigner
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)"
          APK_SIGNED="/tmp/tsp-tracker.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/tsp-release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_SIGNED" \
            "${{ steps.zipalign.outputs.apk }}"
          echo "Signed APK created"
          "$BUILD_TOOLS/apksigner" verify --verbose "$APK_SIGNED" 2>&1 | head -10
          cp "$APK_SIGNED" app/app/build/outputs/apk/release/tsp-tracker.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsp-tracker-apk
          path: app/app/build/outputs/apk/release/tsp-tracker.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2
          name: TSP Tracker v1.2
          body: |
            ## TSP Tracker APK

            Download and install on the tracked phone.

            **Setup:**
            1. Install the APK
            2. Enter a 6-digit code
            3. Open https://tsp-tracker.pages.dev on your browser
            4. Enter the same 6-digit code
            5. Accept the connection on the phone

            Made by OMR
          files: app/app/build/outputs/apk/release/tsp-tracker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
