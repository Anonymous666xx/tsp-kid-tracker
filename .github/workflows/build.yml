name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/tsp-release.keystore
          echo "KEYSTORE_PATH=/tmp/tsp-release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Signed APK
        working-directory: kid-app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon

      - name: Zipalign APK
        run: |
          ALIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)/zipalign"
          APK_IN=$(find kid-app/app/build/outputs/apk/release -name '*.apk' | head -1)
          APK_OUT="/tmp/tsp-tracker.apk"
          $ALIGNER -v -p 4 $APK_IN $APK_OUT 2>&1 | tail -3
          cp $APK_OUT kid-app/app/build/outputs/apk/release/tsp-tracker.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsp-tracker-apk
          path: kid-app/app/build/outputs/apk/release/tsp-tracker.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          name: TSP Tracker v1.1
          body: |
            ## TSP Tracker APK

            Download and install on the kid's phone.

            **Setup:**
            1. Install the APK
            2. Enter the API URL: `https://tsp.omaromartest12.workers.dev`
            3. Set a 6-digit code (e.g. 123456)
            4. Open https://tsp-tracker.pages.dev on parent's browser
            5. Enter the same 6-digit code

            Supports Arabic & English (follows phone language)
          files: kid-app/app/build/outputs/apk/release/tsp-tracker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
