name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Release APK
        working-directory: kid-app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon

      - name: Upload APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: TSP Tracker v1.0
          body: |
            ## TSP Tracker APK

            Download the APK below and install it on the kid's phone.

            **Setup:**
            1. Install the APK
            2. Enter the API URL: `https://tsp.omaromartest12.workers.dev`
            3. Set a 6-digit code (e.g. 123456)
            4. Open the same URL on parent's browser
            5. Enter the same 6-digit code
          files: kid-app/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
